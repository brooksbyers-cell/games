
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooks Byers Games | Unblocked Fun</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #333;
            padding: 1rem 2rem;
            text-align: center;
            border-bottom: 3px solid #ff4757;
        }

        header h1 {
            margin: 0;
            letter-spacing: 2px;
            color: #ff4757;
        }

        /* Game Grid */
        .container {
            flex: 1;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .game-card {
            background-color: #2f3542;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
            text-align: center;
            border: 1px solid #444;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #ff4757;
        }

        .game-thumb {
            width: 100%;
            height: 150px;
            background-color: #57606f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .game-card h3 {
            margin: 15px 0;
        }

        .play-btn {
            display: inline-block;
            margin-bottom: 15px;
            padding: 10px 20px;
            background-color: #ff4757;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Footer Styles */
        footer {
            background-color: #111;
            padding: 2rem;
            text-align: center;
            margin-top: auto;
        }

        .social-links {
            margin-top: 10px;
        }

        .social-links a {
            color: #ccc;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #ff4757;
        }

        .copyright {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>BROOKS BYERS GAMES</h1>
        <p>Your ultimate source for unblocked entertainment</p>
    </header>

    <div class="container">
        <div class="game-card">
            <div class="game-thumb">GAME PREVIEW</div>
            <h3>Super Runner</h3>
            <a href="#" class="play-btn">Play Now</a>
        </div>

        <div class="game-card">
            <div class="game-thumb">GAME PREVIEW</div>
            <h3>Block Breaker</h3>
            <a href="#" class="play-btn">Play Now</a>
        </div>

        <div class="game-card">
            <div class="game-thumb">GAME PREVIEW</div>
            <h3>Space Battle</h3>
            <a href="#" class="play-btn">Play Now</a>
        </div>

        </div>

    <footer>
        <div class="footer-content">
            <strong>FOLLOW US</strong>
            <div class="social-links">
                <a href="https://twitter.com">Twitter</a>
                <a href="https://instagram.com">Instagram</a>
                <a href="https://youtube.com">YouTube</a>
                <a href="https://discord.com">Discord</a>
            </div>
        </div>
        <div class="copyright">
            &copy; 2026 Brooks Byers Games. All rights reserved.
        </div>
    </footer>

</body>
</html>
